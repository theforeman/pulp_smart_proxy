---
name: "SmartProxy CI Update"
on:
  schedule:
    # * is a special character in YAML so you have to quote this string
    # runs at 0:30 UTC every Sunday
    - cron: '30 0 * * 0'
  workflow_dispatch:

jobs:
  update:
    runs-on: "ubuntu-latest"

    strategy:
      fail-fast: false

    steps:
      - uses: "actions/checkout@v4"
        with:
          fetch-depth: 0
          repository: "pulp/plugin_template"
          path: "plugin_template"

      - uses: "actions/setup-python@v5"
        with:
          python-version: "3.11"

      - name: "Install python dependencies"
        run: |
          echo ::group::PYDEPS
          pip install gitpython packaging -r plugin_template/requirements.txt
          echo ::endgroup::

      - name: "Configure Git with theforeman-bot name and email"
        run: |
          git config --global user.name 'theforeman-bot'
          git config --global user.email 'python@community.theforeman.org'
      - uses: "actions/checkout@v4"
        with:
          fetch-depth: 0
          path: "pulp_smart_proxy"
          ref: "develop"

      - name: "Run update"
        working-directory: "pulp_smart_proxy"
        run: |
          ../plugin_template/scripts/update_ci.sh

      - name: "Create Pull Request for CI files"
        uses: "peter-evans/create-pull-request@v6"
        id: "create_pr_develop"
        with:
          token: "${{ secrets.RELEASE_TOKEN }}"
          path: "pulp_smart_proxy"
          committer: "theforeman-bot <python@community.theforeman.org>"
          author: "theforeman-bot <python@community.theforeman.org>"
          title: "Update CI files for branch develop"
          branch: "update-ci/develop"
          base: "develop"
          delete-branch: true
      - name: "Mark PR automerge"
        working-directory: "pulp_smart_proxy"
        run: |
          gh pr merge --rebase --auto "${{ steps.create_pr_develop.outputs.pull-request-number }}"
        if: "steps.create_pr_develop.outputs.pull-request-number"
        env:
          GH_TOKEN: "${{ secrets.RELEASE_TOKEN }}"
        continue-on-error: true
      - uses: "actions/checkout@v4"
        with:
          fetch-depth: 0
          path: "pulp_smart_proxy"
          ref: "0.2"

      - name: "Run update"
        working-directory: "pulp_smart_proxy"
        run: |
          ../plugin_template/scripts/update_ci.sh --release

      - name: "Create Pull Request for CI files"
        uses: "peter-evans/create-pull-request@v6"
        id: "create_pr_0_2"
        with:
          token: "${{ secrets.RELEASE_TOKEN }}"
          path: "pulp_smart_proxy"
          committer: "theforeman-bot <python@community.theforeman.org>"
          author: "theforeman-bot <python@community.theforeman.org>"
          title: "Update CI files for branch 0.2"
          branch: "update-ci/0.2"
          base: "0.2"
          delete-branch: true
      - name: "Mark PR automerge"
        working-directory: "pulp_smart_proxy"
        run: |
          gh pr merge --rebase --auto "${{ steps.create_pr_0_2.outputs.pull-request-number }}"
        if: "steps.create_pr_0_2.outputs.pull-request-number"
        env:
          GH_TOKEN: "${{ secrets.RELEASE_TOKEN }}"
        continue-on-error: true
...
