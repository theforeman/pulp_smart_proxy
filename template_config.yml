# This config represents the latest values used when running the plugin-template. Any settings that
# were not present before running plugin-template have been added with their default values.

# generated with plugin_template
#
# After editing this file please always reapply the plugin template before committing any changes.

---
black: true
check_commit_message: true
check_gettext: true
check_manifest: true
check_stray_pulpcore_imports: true
ci_base_image: "ghcr.io/pulp/pulp-ci-centos9"
ci_env: {}
ci_trigger: "{pull_request: {branches: ['*']}}"
cli_package: "pulp-cli"
cli_repo: "https://github.com/pulp/pulp-cli.git"
core_import_allowed: []
deploy_client_to_pypi: false
deploy_client_to_rubygems: false
deploy_to_pypi: true
disabled_redis_runners: []
docker_fixtures: false
extra_files: []
flake8: true
flake8_ignore: []
github_org: "theforeman"
latest_release_branch: "0.4"
lint_requirements: true
os_required_packages: []
parallel_test_workers: 8
plugin_app_label: "smart_proxy"
plugin_default_branch: "develop"
plugin_name: "pulp_smart_proxy"
plugins:
  - app_label: "smart_proxy"
    name: "pulp_smart_proxy"
pulp_env: {}
pulp_env_azure: {}
pulp_env_gcp: {}
pulp_env_s3: {}
pulp_scheme: "https"
pulp_settings:
  api_root: "/pulp/"
pulp_settings_azure:
  domain_enabled: true
pulp_settings_gcp: null
pulp_settings_s3:
  api_root: "/rerouted/djnd/"
pydocstyle: true
release_email: "python@community.theforeman.org"
release_user: "theforeman-bot"
stalebot: false
stalebot_days_until_close: 30
stalebot_days_until_stale: 90
stalebot_limit_to_pulls: true
supported_release_branches: []
sync_ci: true
test_azure: false
test_cli: false
test_deprecations: true
test_gcp: false
test_lowerbounds: true
test_performance: false
test_s3: false
use_issue_template: true
...

