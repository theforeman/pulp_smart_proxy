# See the documentation for more information:
# https://packit.dev/docs/configuration/

specfile_path: python-pulp-smart-proxy.spec

# add or remove files that should be synced
files_to_sync:
  - python-pulp-smart-proxy.spec
  - .packit.yaml

# name in upstream package repository or registry (e.g. in PyPI)
upstream_package_name: pulp_smart_proxy
# downstream (Fedora) RPM package name
downstream_package_name: python-pulp-smart-proxy

upstream_tag_template: "{version}"

actions:
  post-upstream-clone:
    - "wget https://raw.githubusercontent.com/theforeman/pulpcore-packaging/rpm/develop/packages/python-pulp-smart-proxy/python-pulp-smart-proxy.spec -O python-pulp-smart-proxy.spec"
  get-current-version:
    - bash -c "grep '^version' pyproject.toml | sed 's/\.dev//' | tr -c -d '[0-9.]'"
  create-archive:
    - sed -i '/version/ s/\.dev//' pyproject.toml
    - python3 -m build
    - bash -c "ls -1t ls dist/*.tar.gz | head -n1"

jobs:
  - job: copr_build
    trigger: pull_request
    targets:
      rhel-9: {}
      rhel-10: {}

srpm_build_deps:
  - wget
  - python3-build
